<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenBurner — Design Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Archivo+Black&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Nunito:wght@600;700;800;900&family=Orbitron:wght@500;700;900&family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --orange:#E4572E; --orange-br:#FF6B35; }
  body {
    background: #0b0b0e;
    color: #e8e8ea;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 48px 40px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .page-head { max-width: 1280px; margin: 0 auto 44px; }
  .page-head h1 { font-family:'Space Grotesk'; font-size: 34px; letter-spacing:-.02em; font-weight:700; }
  .page-head h1 span { color: var(--orange-br); }
  .page-head p { color:#8a8a92; margin-top:8px; font-size:15px; max-width:640px; line-height:1.5; }
  .gallery {
    max-width: 1280px; margin: 0 auto;
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 40px 36px;
  }
  .cell { display:flex; flex-direction:column; }
  .meta { display:flex; gap:12px; align-items:flex-start; margin-bottom:14px; min-height:58px; }
  .meta .num { font-family:'Space Grotesk'; font-weight:700; font-size:13px; color:#5a5a64;
    border:1px solid #26262e; border-radius:8px; padding:4px 8px; line-height:1; margin-top:2px; }
  .meta h3 { font-family:'Space Grotesk'; font-size:16px; font-weight:700; letter-spacing:-.01em; }
  .meta p { color:#7d7d87; font-size:12px; margin-top:3px; line-height:1.45; }

  /* phone frame */
  .frame {
    width:100%; aspect-ratio: 320 / 610; border-radius: 34px; overflow:hidden;
    position:relative; isolation:isolate;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
  }
  .app { position:absolute; inset:0; display:flex; flex-direction:column; padding:20px 16px 16px; }

  /* shared structural helpers (themes override visuals) */
  .row { display:flex; align-items:center; }
  .between { justify-content:space-between; }
  .pill { display:inline-flex; align-items:center; gap:7px; }
  .actions { display:grid; grid-template-columns: repeat(3,1fr); gap:9px; }
  .act { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:11px 0; font-size:11px; font-weight:600; }
  .act svg { width:17px; height:17px; }
  .assets { display:flex; flex-direction:column; gap:2px; margin-top:4px; overflow:hidden; }
  .asset { display:flex; align-items:center; gap:11px; padding:10px 4px; }
  .coin { width:32px; height:32px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; }
  .asset .nm { font-weight:600; font-size:13px; line-height:1.1; }
  .asset .sub { font-size:10.5px; opacity:.6; margin-top:2px; }
  .asset .amt { margin-left:auto; text-align:right; font-weight:600; font-size:13px; }
  .asset .amt .s { display:block; font-size:10.5px; opacity:.55; font-weight:500; }
  .tabs { display:flex; gap:4px; margin:14px 0 6px; }
  .tab { flex:1; text-align:center; font-size:12px; font-weight:600; padding:9px 0; }
  .bal-label { font-size:11px; text-transform:uppercase; letter-spacing:.12em; }
  .bal-amt { font-family:'Space Grotesk'; font-weight:700; letter-spacing:-.02em; }

  /* ============ 01 EMBER NOIR ============ */
  .t-ember { background:radial-gradient(120% 80% at 50% -10%, #2a1206 0%, #120a08 45%, #08070a 100%); color:#f4ece8; font-family:'Space Grotesk',sans-serif; }
  .t-ember::after{content:"";position:absolute;inset:0;background:radial-gradient(60% 40% at 50% 8%, rgba(255,107,53,.28),transparent 70%);pointer-events:none;}
  .t-ember .netpill{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:999px; padding:7px 12px; font-size:12px; font-weight:600; backdrop-filter:blur(8px);}
  .t-ember .dot{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#8a8a90,#cfcfd6);}
  .t-ember .menu{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;}
  .t-ember .card{margin-top:20px;padding:18px;border-radius:22px;background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09);box-shadow:0 0 40px -10px rgba(255,107,53,.4) inset, 0 20px 40px -24px #000;}
  .t-ember .bal-label{color:#c89a86;opacity:.85;}
  .t-ember .bal-amt{font-size:38px;background:linear-gradient(180deg,#fff,#ffd9c7);-webkit-background-clip:text;background-clip:text;color:transparent;margin:6px 0 2px;}
  .t-ember .bal-sub{font-size:12px;color:#b89a8d;}
  .t-ember .actions{margin-top:16px;}
  .t-ember .act{border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#f0e6e0;}
  .t-ember .act.prime{background:linear-gradient(135deg,var(--orange-br),var(--orange));border:none;color:#fff;box-shadow:0 8px 24px -8px rgba(255,107,53,.7);}
  .t-ember .tab{border-radius:999px;color:#b29a8f;}
  .t-ember .tab.on{background:rgba(255,107,53,.16);color:#ffd9c7;border:1px solid rgba(255,107,53,.35);}
  .t-ember .asset{border-bottom:1px solid rgba(255,255,255,.05);}
  .t-ember .asset .sub,.t-ember .amt .s{color:#b29a8f;}

  /* ============ 02 NEO-BRUTALIST ============ */
  .t-brut{background:#FFE7C2;color:#0a0a0a;font-family:'Archivo',sans-serif;}
  .t-brut .netpill{background:#fff;border:2.5px solid #0a0a0a;border-radius:0;padding:7px 11px;font-size:12px;font-weight:800;box-shadow:3px 3px 0 #0a0a0a;}
  .t-brut .dot{width:13px;height:13px;border-radius:50%;background:#3b82f6;border:2px solid #0a0a0a;}
  .t-brut .menu{width:36px;height:36px;border:2.5px solid #0a0a0a;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:3px 3px 0 #0a0a0a;}
  .t-brut .card{margin-top:18px;padding:18px;background:var(--orange);border:3px solid #0a0a0a;box-shadow:6px 6px 0 #0a0a0a;color:#fff;}
  .t-brut .bal-label{font-weight:800;color:#1a0a04;}
  .t-brut .bal-amt{font-family:'Archivo';font-weight:900;font-size:40px;color:#fff;margin:4px 0;}
  .t-brut .bal-sub{font-weight:700;font-size:12px;color:#2a0f06;}
  .t-brut .actions{margin-top:16px;gap:10px;}
  .t-brut .act{background:#fff;border:3px solid #0a0a0a;color:#0a0a0a;font-weight:800;box-shadow:3px 3px 0 #0a0a0a;}
  .t-brut .act.prime{background:#FFE94A;}
  .t-brut .tab{border:2.5px solid #0a0a0a;font-weight:800;background:#fff;}
  .t-brut .tab.on{background:#0a0a0a;color:#fff;}
  .t-brut .coin{border:2px solid #0a0a0a;border-radius:0;}
  .t-brut .asset{border:2.5px solid #0a0a0a;background:#fff;margin-bottom:7px;padding:9px;box-shadow:2px 2px 0 #0a0a0a;}
  .t-brut .asset .nm{font-weight:800;}

  /* ============ 03 LIQUID GLASS ============ */
  .t-glass{background:linear-gradient(160deg,#dfe7f5 0%,#eef1f8 40%,#f7e9ef 100%);color:#1c2230;font-family:'Inter',sans-serif;}
  .t-glass::before{content:"";position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#ff9a6b,transparent 70%);top:-40px;right:-30px;filter:blur(20px);opacity:.6;}
  .t-glass::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,#7aa6ff,transparent 70%);bottom:40px;left:-40px;filter:blur(24px);opacity:.5;}
  .t-glass .app>*{position:relative;z-index:2;}
  .t-glass .netpill{background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.8);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;backdrop-filter:blur(14px);box-shadow:0 4px 16px rgba(80,100,160,.18);}
  .t-glass .dot{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#6d8bff,#a0b4ff);}
  .t-glass .menu{width:34px;height:34px;border-radius:12px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(14px);}
  .t-glass .card{margin-top:20px;padding:20px;border-radius:26px;background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.9);backdrop-filter:blur(22px);box-shadow:0 18px 50px -18px rgba(80,100,160,.4);}
  .t-glass .bal-label{color:#5a6478;}
  .t-glass .bal-amt{font-size:38px;color:#161c2b;margin:6px 0 2px;font-family:'Inter';font-weight:800;letter-spacing:-.03em;}
  .t-glass .bal-sub{font-size:12px;color:#6b7488;}
  .t-glass .actions{margin-top:16px;}
  .t-glass .act{border-radius:16px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.9);color:#28304a;backdrop-filter:blur(10px);font-weight:600;}
  .t-glass .act.prime{background:linear-gradient(135deg,#ff8b5e,#ff6b35);color:#fff;border:none;box-shadow:0 10px 24px -8px rgba(255,107,53,.6);}
  .t-glass .tab{border-radius:999px;color:#6b7488;}
  .t-glass .tab.on{background:rgba(255,255,255,.7);color:#1c2230;box-shadow:0 4px 12px rgba(80,100,160,.2);}
  .t-glass .asset .sub,.t-glass .amt .s{color:#7a8398;}

  /* ============ 04 SWISS MINIMAL ============ */
  .t-swiss{background:#fafafa;color:#111;font-family:'Inter',sans-serif;}
  .t-swiss .app{padding:24px 18px 18px;}
  .t-swiss .netpill{font-size:12px;font-weight:600;letter-spacing:-.01em;color:#111;}
  .t-swiss .dot{width:9px;height:9px;border-radius:50%;background:var(--orange);}
  .t-swiss .menu{font-size:18px;letter-spacing:2px;color:#111;}
  .t-swiss .topline{height:1px;background:#111;margin:16px 0 0;}
  .t-swiss .bal-label{color:#999;margin-top:26px;}
  .t-swiss .bal-amt{font-family:'Inter';font-weight:800;font-size:46px;letter-spacing:-.04em;margin:8px 0 4px;}
  .t-swiss .bal-amt .cur{color:var(--orange);}
  .t-swiss .bal-sub{font-size:12px;color:#888;}
  .t-swiss .actions{margin-top:26px;border-top:1px solid #111;border-bottom:1px solid #111;gap:0;}
  .t-swiss .act{border-right:1px solid #e2e2e2;border-radius:0;color:#111;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:10px;}
  .t-swiss .act:last-child{border-right:none;}
  .t-swiss .act.prime{color:var(--orange);}
  .t-swiss .tabs{margin:24px 0 8px;border-bottom:1px solid #e2e2e2;gap:18px;}
  .t-swiss .tab{flex:0 0 auto;text-align:left;padding:0 0 10px;color:#aaa;font-weight:600;letter-spacing:-.01em;}
  .t-swiss .tab.on{color:#111;border-bottom:2px solid var(--orange);}
  .t-swiss .coin{border-radius:0;background:#111 !important;font-size:11px;}
  .t-swiss .asset{border-bottom:1px solid #ededed;padding:14px 0;}
  .t-swiss .asset .nm{font-weight:600;letter-spacing:-.01em;}
  .t-swiss .asset .sub,.t-swiss .amt .s{color:#999;}

  /* ============ 05 TERMINAL / CYPHERPUNK ============ */
  .t-term{background:#07090a;color:#36f08a;font-family:'JetBrains Mono',monospace;}
  .t-term::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(54,240,138,.05) 0 1px,transparent 1px 3px);pointer-events:none;}
  .t-term .app>*{position:relative;z-index:2;}
  .t-term .netpill{border:1px solid #1e5e3a;border-radius:4px;padding:6px 9px;font-size:11px;color:#36f08a;background:rgba(54,240,138,.05);}
  .t-term .dot{width:8px;height:8px;border-radius:50%;background:#36f08a;box-shadow:0 0 8px #36f08a;}
  .t-term .menu{border:1px solid #1e5e3a;width:32px;height:30px;display:flex;align-items:center;justify-content:center;color:#36f08a;border-radius:4px;}
  .t-term .card{margin-top:18px;padding:16px;border:1px solid #1e5e3a;border-radius:6px;background:rgba(54,240,138,.03);}
  .t-term .bal-label{color:#1f8a52;letter-spacing:.1em;}
  .t-term .bal-amt{font-family:'JetBrains Mono';font-weight:700;font-size:34px;color:#7dffb4;text-shadow:0 0 12px rgba(54,240,138,.5);margin:8px 0 2px;}
  .t-term .bal-sub{font-size:11px;color:#1f8a52;}
  .t-term .bal-sub::before{content:"> ";}
  .t-term .actions{margin-top:16px;}
  .t-term .act{border:1px solid #1e5e3a;border-radius:4px;color:#36f08a;background:transparent;text-transform:uppercase;font-size:10px;letter-spacing:.05em;}
  .t-term .act.prime{background:#36f08a;color:#04140b;border-color:#36f08a;font-weight:700;}
  .t-term .tab{border:1px solid #1e5e3a;border-radius:4px;color:#1f8a52;font-size:11px;}
  .t-term .tab.on{background:rgba(54,240,138,.12);color:#7dffb4;}
  .t-term .coin{border-radius:4px;background:#0e2a1b !important;color:#36f08a;border:1px solid #1e5e3a;font-family:'JetBrains Mono';}
  .t-term .asset{border-bottom:1px dashed #163a25;}
  .t-term .asset .nm{font-weight:500;}
  .t-term .asset .sub,.t-term .amt .s{color:#1f8a52;}

  /* ============ 06 ANALOG GOLD (warm premium) ============ */
  .t-gold{background:#f3ead9;color:#2b2117;font-family:'Fraunces',serif;}
  .t-gold .netpill{background:#fff8ec;border:1px solid #d9c9a8;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;font-family:'Inter';color:#5a4a32;}
  .t-gold .dot{width:13px;height:13px;border-radius:50%;background:linear-gradient(135deg,#caa24a,#9c7a2e);}
  .t-gold .menu{width:34px;height:34px;border-radius:50%;border:1px solid #d9c9a8;background:#fff8ec;display:flex;align-items:center;justify-content:center;color:#5a4a32;}
  .t-gold .card{margin-top:20px;padding:22px;border-radius:18px;background:linear-gradient(150deg,#3a2c1c,#22190f);color:#f3ead9;border:1px solid #5a4a32;box-shadow:0 20px 40px -22px rgba(60,40,15,.7);}
  .t-gold .bal-label{font-family:'Inter';font-weight:600;color:#c9b083;letter-spacing:.14em;}
  .t-gold .bal-amt{font-family:'Fraunces';font-weight:900;font-size:42px;margin:6px 0 2px;color:#f6ecd6;}
  .t-gold .bal-sub{font-family:'Inter';font-size:12px;color:#c9b083;}
  .t-gold .actions{margin-top:18px;}
  .t-gold .act{border-radius:12px;background:#fff8ec;border:1px solid #d9c9a8;color:#5a4a32;font-family:'Inter';font-weight:600;}
  .t-gold .act.prime{background:linear-gradient(135deg,#d4ab52,#b3892f);color:#241a0d;border:none;}
  .t-gold .tab{font-family:'Inter';color:#9c8763;}
  .t-gold .tab.on{color:#2b2117;border-bottom:2px solid #b3892f;}
  .t-gold .coin{border-radius:50%;}
  .t-gold .asset{border-bottom:1px solid #ddcdab;}
  .t-gold .asset .nm{font-family:'Fraunces';font-weight:600;font-size:14px;}
  .t-gold .asset .sub,.t-gold .amt .s{font-family:'Inter';color:#9c8763;}
  .t-gold .amt{font-family:'Fraunces';}

  /* ============ 07 CLAYMORPHISM ============ */
  .t-clay{background:#efe9ff;color:#3a2f55;font-family:'Nunito',sans-serif;}
  .t-clay .netpill{background:#f7f3ff;border-radius:999px;padding:8px 13px;font-size:12px;font-weight:800;box-shadow:5px 5px 12px #d3cae8, -5px -5px 12px #fff;}
  .t-clay .dot{width:14px;height:14px;border-radius:50%;background:#8b6bff;}
  .t-clay .menu{width:38px;height:38px;border-radius:14px;background:#f7f3ff;display:flex;align-items:center;justify-content:center;box-shadow:5px 5px 12px #d3cae8,-5px -5px 12px #fff;color:#6b5aa8;}
  .t-clay .card{margin-top:20px;padding:22px;border-radius:28px;background:linear-gradient(135deg,#ff8b5e,#ff6b35);color:#fff;box-shadow:8px 8px 22px #d9a48c,-6px -6px 18px #ffd9c7, inset 2px 2px 6px rgba(255,255,255,.4);}
  .t-clay .bal-label{color:#fff3ec;opacity:.85;font-weight:800;}
  .t-clay .bal-amt{font-family:'Nunito';font-weight:900;font-size:40px;margin:6px 0 2px;}
  .t-clay .bal-sub{font-size:12px;font-weight:700;color:#fff0e8;}
  .t-clay .actions{margin-top:18px;}
  .t-clay .act{border-radius:18px;background:#f7f3ff;color:#5a4a8a;font-weight:800;box-shadow:5px 5px 12px #d3cae8,-5px -5px 12px #fff;}
  .t-clay .act.prime{background:linear-gradient(135deg,#9b7bff,#7b5aff);color:#fff;box-shadow:5px 5px 14px #c3b3e8;}
  .t-clay .tab{border-radius:999px;color:#8a7cb0;font-weight:800;}
  .t-clay .tab.on{background:#f7f3ff;color:#5a4a8a;box-shadow:inset 3px 3px 7px #d3cae8,inset -3px -3px 7px #fff;}
  .t-clay .coin{box-shadow:3px 3px 7px rgba(120,100,180,.3);}
  .t-clay .asset{margin-bottom:8px;padding:11px;border-radius:18px;background:#f7f3ff;box-shadow:4px 4px 10px #d9d2ec,-4px -4px 10px #fff;}
  .t-clay .asset .nm{font-weight:800;}
  .t-clay .asset .sub,.t-clay .amt .s{color:#9388b8;font-weight:700;}

  /* ============ 08 AURORA MESH ============ */
  .t-aurora{background:#0e0a1a;color:#f0ecff;font-family:'Sora',sans-serif;}
  .t-aurora::before{content:"";position:absolute;inset:-20%;background:
    radial-gradient(40% 35% at 20% 15%, #ff6b35aa, transparent 60%),
    radial-gradient(45% 40% at 85% 25%, #c026d3aa, transparent 60%),
    radial-gradient(50% 45% at 60% 95%, #6d28d9aa, transparent 60%),
    radial-gradient(40% 40% at 10% 90%, #2563ebaa, transparent 60%);
    filter:blur(20px);}
  .t-aurora .app>*{position:relative;z-index:2;}
  .t-aurora .netpill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;backdrop-filter:blur(12px);}
  .t-aurora .dot{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#ff6b35,#c026d3);}
  .t-aurora .menu{width:34px;height:34px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);}
  .t-aurora .card{margin-top:20px;padding:20px;border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(20px);box-shadow:0 20px 50px -20px #000;}
  .t-aurora .bal-label{color:#c9bff0;}
  .t-aurora .bal-amt{font-family:'Sora';font-weight:800;font-size:38px;margin:6px 0 2px;background:linear-gradient(100deg,#fff,#ffb89e,#e9a6ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .t-aurora .bal-sub{font-size:12px;color:#bcb0e6;}
  .t-aurora .actions{margin-top:16px;}
  .t-aurora .act{border-radius:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#f0ecff;font-weight:600;backdrop-filter:blur(8px);}
  .t-aurora .act.prime{background:linear-gradient(135deg,#ff6b35,#c026d3);border:none;color:#fff;box-shadow:0 10px 26px -8px rgba(192,38,211,.6);}
  .t-aurora .tab{border-radius:999px;color:#bcb0e6;}
  .t-aurora .tab.on{background:rgba(255,255,255,.12);color:#fff;}
  .t-aurora .asset{border-bottom:1px solid rgba(255,255,255,.07);}
  .t-aurora .asset .sub,.t-aurora .amt .s{color:#bcb0e6;}

  /* ============ 09 SYNTHWAVE ============ */
  .t-synth{background:linear-gradient(180deg,#1a0a2e 0%,#2d0b4e 45%,#5b1768 70%,#ff5e7a 100%);color:#fdf0ff;font-family:'Orbitron',sans-serif;}
  .t-synth::after{content:"";position:absolute;left:0;right:0;bottom:0;height:42%;background-image:linear-gradient(rgba(255,94,200,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,94,200,.5) 1px,transparent 1px);background-size:26px 22px;transform:perspective(160px) rotateX(62deg);transform-origin:bottom;opacity:.5;}
  .t-synth .app>*{position:relative;z-index:2;}
  .t-synth .netpill{border:1px solid #ff79d4;border-radius:6px;padding:6px 11px;font-size:10px;font-weight:500;background:rgba(20,4,40,.5);color:#ffc4f0;letter-spacing:.05em;}
  .t-synth .dot{width:11px;height:11px;border-radius:50%;background:#22d3ee;box-shadow:0 0 8px #22d3ee;}
  .t-synth .menu{width:34px;height:32px;border:1px solid #ff79d4;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#ffc4f0;background:rgba(20,4,40,.5);}
  .t-synth .card{margin-top:18px;padding:18px;border-radius:12px;background:rgba(18,4,38,.55);border:1px solid #ff79d4;box-shadow:0 0 24px rgba(255,121,212,.5),inset 0 0 24px rgba(124,58,237,.3);}
  .t-synth .bal-label{color:#22d3ee;letter-spacing:.16em;font-size:10px;text-shadow:0 0 8px rgba(34,211,238,.6);}
  .t-synth .bal-amt{font-family:'Orbitron';font-weight:900;font-size:32px;margin:8px 0 4px;color:#fff;text-shadow:0 0 12px #ff79d4,0 0 24px rgba(255,121,212,.6);}
  .t-synth .bal-sub{font-size:9px;color:#ffc4f0;letter-spacing:.08em;}
  .t-synth .actions{margin-top:16px;}
  .t-synth .act{border-radius:8px;border:1px solid #ff79d4;background:rgba(20,4,40,.4);color:#ffc4f0;font-size:9px;letter-spacing:.05em;}
  .t-synth .act.prime{background:linear-gradient(135deg,#ff79d4,#ff5e7a);color:#1a0a2e;border:none;font-weight:700;box-shadow:0 0 16px rgba(255,121,212,.7);}
  .t-synth .tab{border-radius:6px;color:#b98fd6;font-size:10px;border:1px solid transparent;}
  .t-synth .tab.on{border-color:#22d3ee;color:#a9f6ff;box-shadow:0 0 12px rgba(34,211,238,.4);}
  .t-synth .coin{border-radius:6px;box-shadow:0 0 10px rgba(255,121,212,.4);}
  .t-synth .asset{border-bottom:1px solid rgba(255,121,212,.2);}
  .t-synth .asset .nm{font-family:'Sora';font-weight:700;}
  .t-synth .asset .sub,.t-synth .amt .s{color:#c79fe0;font-family:'Sora';}
  .t-synth .amt{font-family:'Orbitron';font-size:11px;}

  /* ============ 10 BAUHAUS ============ */
  .t-bau{background:#f4f1ea;color:#1a1a1a;font-family:'Archivo',sans-serif;}
  .t-bau .netpill{background:#1a1a1a;color:#fff;border-radius:0;padding:7px 12px;font-size:12px;font-weight:800;}
  .t-bau .dot{width:12px;height:12px;border-radius:50%;background:#e63946;}
  .t-bau .menu{width:36px;height:36px;background:#1d4ed8;display:flex;align-items:center;justify-content:center;color:#fff;border-radius:0;}
  .t-bau .card{margin-top:16px;padding:0;border:none;background:transparent;position:relative;}
  .t-bau .baulock{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:6px;}
  .t-bau .bblock{padding:16px;}
  .t-bau .b-amt{grid-column:1 / 3;background:var(--orange);color:#fff;}
  .t-bau .b-circ{background:#1d4ed8;display:flex;align-items:center;justify-content:center;aspect-ratio:1;border-radius:50%;}
  .t-bau .b-tri{background:#f7c948;clip-path:polygon(0 100%,100% 100%,100% 0);}
  .t-bau .bal-label{font-weight:800;color:#2a0f06;}
  .t-bau .bal-amt{font-family:'Archivo Black';font-size:36px;color:#fff;margin-top:6px;letter-spacing:-.02em;}
  .t-bau .bal-sub{font-weight:700;font-size:11px;color:#2a0f06;margin-top:2px;}
  .t-bau .actions{margin-top:14px;gap:6px;}
  .t-bau .act{border-radius:0;background:#1a1a1a;color:#fff;font-weight:800;text-transform:uppercase;font-size:10px;}
  .t-bau .act.prime{background:#e63946;}
  .t-bau .tab{border-radius:0;background:#fff;border:2px solid #1a1a1a;font-weight:800;}
  .t-bau .tab.on{background:#f7c948;}
  .t-bau .coin{border-radius:0;}
  .t-bau .asset{border-bottom:2px solid #1a1a1a;}
  .t-bau .asset .nm{font-weight:800;}
  .t-bau .asset .sub,.t-bau .amt .s{color:#777;font-weight:600;}
</style>
</head>
<body>
<div class="page-head">
  <h1>Open<span>Burner</span> — Design Directions</h1>
  <p>Ten distinct visual languages, each mocked on the same screen (wallet dashboard) so the <em>direction</em> is the only variable. Pick the mood that feels like "us" — we'll then expand the winner across sign-in, menus, settings, and every screen.</p>
</div>
<div class="gallery" id="gallery"></div>

<script>
const ICON = {
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>',
  swap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
  recv:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>',
  menu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>'
};
const coins=[
  {l:'Ξ',n:'Ethereum',s:'ETH',a:'5.6889',v:'$21,455',c:'linear-gradient(135deg,#627eea,#8aa0f5)'},
  {l:'$',n:'USD Coin',s:'USDC',a:'1,240.00',v:'$1,240',c:'linear-gradient(135deg,#2775ca,#4f9bf0)'},
  {l:'₮',n:'Tether',s:'USDT',a:'298.25',v:'$298',c:'linear-gradient(135deg,#26a17b,#4cd0a0)'},
  {l:'W',n:'Wrapped Eth',s:'WETH',a:'1.4619',v:'$5,512',c:'linear-gradient(135deg,#e4572e,#ff8c61)'}
];
const dirs=[
  {t:'ember',name:'Ember Noir',desc:'Cinematic near-black, molten glow, glass. Refined evolution of today.'},
  {t:'brut',name:'Neo-Brutalist Cash',desc:'Thick borders, hard shadows, chunky type. Bold, physical, confident.'},
  {t:'glass',name:'Liquid Glass',desc:'Frosted translucency & soft depth. Apple-premium, calm, modern.'},
  {t:'swiss',name:'Swiss Editorial',desc:'Whitespace, grid, data-as-typography. Serious institutional fintech.'},
  {t:'term',name:'Terminal / Cypherpunk',desc:'Mono, CRT scanlines, green phosphor. Self-custody hacker ethos.'},
  {t:'gold',name:'Analog Gold',desc:'Cream + serif + gold leaf. Luxury physical object, gift-worthy.'},
  {t:'clay',name:'Soft Clay',desc:'Puffy 3D, warm pastels, friendly. Approachable & giftable.'},
  {t:'aurora',name:'Aurora Mesh',desc:'Flowing gradient mesh + glass. Energetic, expressive web3.'},
  {t:'synth',name:'Synthwave Horizon',desc:'80s neon sunset grid. Heat, motion, unapologetic personality.'},
  {t:'bau',name:'Bauhaus Blocks',desc:'Primary shapes & color blocks. Structured, expressive, iconic.'}
];

function assetRows(t){
  const lim = (t==='brut'||t==='clay')?3:4;
  return coins.slice(0,lim).map(c=>`
    <div class="asset">
      <div class="coin" style="background:${c.c}">${c.l}</div>
      <div><div class="nm">${c.s}</div><div class="sub">${c.n}</div></div>
      <div class="amt">${c.a}<span class="s">${c.v}</span></div>
    </div>`).join('');
}

function balanceBlock(t){
  if(t==='bau'){
    return `<div class="card"><div class="baulock">
      <div class="bblock b-amt"><div class="bal-label">Total Balance</div><div class="bal-amt">$28,505</div><div class="bal-sub">▲ 4.2% today</div></div>
      <div class="bblock b-circ"></div>
      <div class="bblock b-tri"></div>
    </div></div>`;
  }
  const amt = t==='swiss' ? `<span class="cur">$</span>28,505` : `$28,505`;
  return `<div class="card">
    <div class="bal-label">Total Balance</div>
    <div class="bal-amt">${amt}</div>
    <div class="bal-sub">▲ 4.2% · 6.21 ETH today</div>
  </div>`;
}

document.getElementById('gallery').innerHTML = dirs.map((d,i)=>`
  <div class="cell">
    <div class="meta">
      <span class="num">${String(i+1).padStart(2,'0')}</span>
      <div><h3>${d.name}</h3><p>${d.desc}</p></div>
    </div>
    <div class="frame t-${d.t}">
      <div class="app">
        <div class="row between">
          <span class="netpill pill"><span class="dot"></span>Ethereum</span>
          <span class="menu">${ICON.menu}</span>
        </div>
        ${t_topline(d.t)}
        ${balanceBlock(d.t)}
        <div class="actions">
          <div class="act prime">${ICON.send}Send</div>
          <div class="act">${ICON.swap}Swap</div>
          <div class="act">${ICON.recv}Receive</div>
        </div>
        <div class="tabs">
          <div class="tab on">Tokens</div>
          <div class="tab">Collectibles</div>
        </div>
        <div class="assets">${assetRows(d.t)}</div>
      </div>
    </div>
  </div>`).join('');

function t_topline(t){ return t==='swiss' ? '<div class="topline"></div>' : ''; }
</script>
</body>
</html>
